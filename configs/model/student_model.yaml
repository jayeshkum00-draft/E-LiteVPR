# Student model (Phase 1 distillation target of the cached DINOv3 teacher).
# num_patches / img_hw MUST match the teacher cache (384x384, ViT-L/16 -> 576 patches).
# If these drift from model/teacher_model.yaml's expected_patches, AGFD spatial
# correspondence silently breaks -- see session notes.

backbone_name: 'vit_small_patch16_dinov3.lvd1689m'
img_hw: [384, 384]          # must equal teacher_model.yaml img_hw
patch_size: 16
num_patches: 576            # must equal teacher_model.yaml expected_patches
teacher_dim: 1024           # must equal teacher_model.yaml teacher_model_output_dim