device: cuda

data:
  modality: histogram           # override: histogram | voxel
  input_channels: 3

model_weights: /kaggle/working/best_phase1_histogram.pth   # override per run

# directory containing the denoised *.parquet and *.nmea files
# (searched recursively, so a flat HF download or nested layout both work)
root: /kaggle/input/brisbane-event-vpr

# traverse name -> recording key used to locate the files.
traverses:
  sunset1: 2020-04-21-17-03-03
  sunset2: 2020-04-22-17-24-21
  daytime: 2020-04-24-15-12-03
  morning: 2020-04-28-09-14-11
  sunrise: 2020-04-29-06-20-23
  night:   2020-04-27-18-13-29   

reference: sunset1              # paper: sunset1 vs the other five

sensor_hw: [260, 346]           # DAVIS346 (H, W)
dt: 1.0
sample_hz: 1.0
time_offset: 0.0                # escape hatch if event/GPS clocks disagree

# Per-recording event-vs-GPS clock offset in seconds: GPS is sampled at
# event_time + offset. Events (ROS host clock) and NMEA (GPS/UTC, logged
# by the consumer camera) are separate devices; the official alignment is
# sparse-event-vpr's per-recording video_beginning anchors, where
# position(event t) = gps_relative(t - video_beginning). Equivalently:
#   offset = first_RMC_fix_utc - video_beginning
# Values below are derived from those published anchors; 
# see - 'https://github.com/Tobias-Fischer/sparse-event-vpr/blob/main/src/sparse_event_vpr/constants.py'
clock_offsets:
  sunset1: 0.65                 # 1587452594.0 - 1587452593.35
  sunset2: 2.35                 # 1587540274.0 - 1587540271.65
  daytime: 3.20                 # 1587705140.0 - 1587705136.80
  morning: 7.27                 # 1588029279.0 - 1588029271.73
  sunrise: 7.09                 # 1588105248.0 - 1588105240.91
  night:   0.0                  # absent from sparse-event-vpr constants;
                                # set from the cross-correlation estimate
                                # (expect ~4.5-7 by the date-drift trend)

gt_threshold_m: 25.0
seq_lengths: [1, 10, 20, 30]
min_speed_ms: 1.0               # stationary-frame removal threshold (m/s);
                                # both 'all' and 'moving' variants are reported

# representation parameters — must match DSEC preprocessing
hot_pixel_threshold: 99.5       # = cfg.datasets.event_hot_pixels_threshold at train time
voxel_bins: 3                   # = cfg.datasets.event_voxel_bins at train time

lat0: -27.47
lon0: 152.98

batch_size: 32
num_workers: 2                  # Kaggle: 4 vCPU

cache_dir: /kaggle/working/brisbane_cache
results_csv: /kaggle/working/brisbane_results_{modality}_dt{dt}.csv
