# NYC-Event-VPR slices for Phase 2 triplet training (EVK4 / IMX636 raws +
# GPS csv). All sessions share one geographic frame ('gps'), so the miner
# cross-mines every session pair, including day<->night.

root: /content/drive/MyDrive/E-LiteVPR/NYC-Event-VPR/Events
slices_dir: ${.root}/../slices

# session dir -> day|night label (baked into the output filename so the
# miner's night_keyword tagging works unchanged). Labels below are from
# local sunset times at the recording dates -- verify against the RGB imgs.
sessions:
  sensor_data_2022-12-06_18-27-21: night
  sensor_data_2022-12-06_19-27-59: night
  sensor_data_2022-12-06_20-45-53: night
  sensor_data_2022-12-07_15-46-32: day
  sensor_data_2022-12-07_16-52-55: day
  sensor_data_2022-12-07_17-58-34: day
  sensor_data_2022-12-09_13-59-10: day
  sensor_data_2022-12-09_14-41-29: day
  sensor_data_2022-12-09_18-56-13: night
  sensor_data_2022-12-09_19-42-07: night
  sensor_data_2022-12-20_16-54-11: day
  sensor_data_2023-02-14_15-06-30: day
  sensor_data_2023-02-14_18-20-40: night
  sensor_data_2023-04-20_15-53-26: day
  sensor_data_2023-04-20_17-10-01: day
session: all                    # 'all' or a single dir name

timezone: America/New_York      # raw filenames are local wall time
encoding: evt3                  # EVK4 default; expelliarmus decoder
sensor_hw: [720, 1280]          # IMX636 (H, W)

# shared local-metres origin for ALL sessions (one 'gps' frame)
lat0: 40.69
lon0: -74.00

slice_ms: 1200.0
hz: 1.0
min_speed: 1.0

# --- triplet mining (phase2_mine_triplets.py, same keys as mvsec.yaml) ---
night_keyword: night
pos_radius: 25.0
cross_radius: 25.0              # no registration error here (shared GPS frame),
                                # but GPS multipath -> keep neg_floor generous
neg_floor: 200.0
min_dt: 60.0
index_out: ${.root}/../phase2_index_nyc.npz
