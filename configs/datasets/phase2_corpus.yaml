# Phase 2 metric-learning corpus: MVSEC + NYC slice h5s + mined indexes.
# Select with `datasets=phase2_corpus` for phase2_train.py.

sources:
  mvsec:
    slices_dir: /content/drive/MyDrive/E-LiteVPR/MVSEC/slices
    index: /content/drive/MyDrive/E-LiteVPR/MVSEC/phase2_index_mvsec.npz
    sensor_hw: [260, 346]           # DAVIS346
    exclude_seqs: [outdoor_night3.h5]   # val probe: never sampled in training
  nyc:
    slices_dir: /content/drive/MyDrive/E-LiteVPR/NYC-Event-VPR/slices
    index: /content/drive/MyDrive/E-LiteVPR/NYC-Event-VPR/phase2_index_nyc.npz
    sensor_hw: [720, 1280]          # EVK4 / IMX636
    exclude_seqs: []

# validation probe: descriptor retrieval query->db, R@1 at val_radius
# (registered into the same frame; xy comparable)
val_probe:
  source: mvsec
  query_seq: outdoor_night3.h5
  db_seq: outdoor_day2.h5
  radius: 30.0                      # m; matches the cross-condition budget

hot_pixel_threshold: 99.5           # same per-window masking as Phase 1/eval
voxel_bins: 3                       # only used when data.modality=voxel
